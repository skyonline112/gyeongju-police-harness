<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행정 민원 검증 및 답변 생성 에이전트 대시보드</title>
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* CSS 변수 설정 (보라/청록 계열의 프리미엄 하모니) */
    :root {
      --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #060510 100%);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-glow: rgba(147, 51, 234, 0.15);
      
      --color-text-primary: #f3f4f6;
      --color-text-muted: #9ca3af;
      
      --accent-purple: #a855f7;
      --accent-cyan: #06b6d4;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --accent-blue: #3b82f6;
      
      --card-radius: 16px;
      --transition-smooth: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background: var(--bg-gradient);
      color: var(--color-text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* 배경 데코레이션 조명 효과 */
    .bg-glow-1 {
      position: absolute;
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .bg-glow-2 {
      position: absolute;
      bottom: -10%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    /* 헤더 스타일 */
    header {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInDown 0.8s ease-out;
    }

    header h1 {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(to right, #ffffff 30%, #c084fc 70%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--color-text-muted);
      font-size: 1.1rem;
      font-weight: 300;
      max-width: 700px;
      margin: 0 auto;
    }

    /* 대시보드 메인 레이아웃 */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 30px;
      margin-top: 20px;
    }

    @media (max-width: 900px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 사이드바 탭 제어기 */
    .sidebar {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 24px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      height: fit-content;
      animation: fadeInLeft 0.8s ease-out;
    }

    .sidebar h2 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent-purple);
      margin-bottom: 20px;
      font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 10px;
    }

    .tab-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      list-style: none;
    }

    .tab-item {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid transparent;
      cursor: pointer;
      transition: var(--transition-smooth);
      position: relative;
      overflow: hidden;
    }

    .tab-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 4px;
      background: var(--accent-purple);
      opacity: 0;
      transition: var(--transition-smooth);
    }

    .tab-item:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
      transform: translateX(4px);
    }

    .tab-item.active {
      background: rgba(168, 85, 247, 0.08);
      border-color: rgba(168, 85, 247, 0.2);
      box-shadow: inset 0 0 12px rgba(168, 85, 247, 0.05);
    }

    .tab-item.active::before {
      opacity: 1;
    }

    .tab-number {
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--color-text-muted);
      margin-right: 12px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
    }

    .tab-item.active .tab-number {
      background: var(--accent-purple);
      color: #ffffff;
    }

    .tab-label {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    /* 메인 콘텐츠 패널 */
    .content-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 35px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      position: relative;
      animation: fadeInRight 0.8s ease-out;
      min-height: 500px;
    }

    /* 에이전트 인포 카드 */
    .agent-card {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 24px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      margin-bottom: 28px;
    }

    .agent-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: bold;
      color: #fff;
    }

    .agent-meta {
      text-align: left;
    }

    .agent-meta h3 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .agent-meta p {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }

    /* 공문서 렌더러 프레임 */
    .doc-renderer {
      background: #11101a;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 30px;
      color: #e5e7eb;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-all;
      animation: fadeIn 0.4s ease-out;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
      text-align: left;
    }

    .doc-renderer h1, .doc-renderer h2, .doc-renderer h3 {
      color: #fff;
      font-weight: 700;
      margin-top: 20px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 6px;
    }

    .doc-renderer h1:first-child {
      margin-top: 0;
    }

    .doc-renderer ul {
      margin-left: 20px;
      margin-bottom: 14px;
    }

    .doc-renderer li {
      margin-bottom: 6px;
    }

    .doc-renderer code {
      background: rgba(255, 255, 255, 0.07);
      padding: 3px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: #f472b6;
    }

    .doc-renderer pre {
      background: #08070d;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .doc-renderer pre code {
      background: none;
      padding: 0;
      color: #a78bfa;
    }

    /* 상태 뱃지 스타일 */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-approved {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent-green);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .badge-rejected {
      background: rgba(239, 68, 68, 0.15);
      color: var(--accent-red);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* 애니메이션 효과 */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .fade-element {
      animation: fadeIn 0.5s ease-out;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      color: var(--color-text-muted);
      font-size: 0.85rem;
      font-weight: 300;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 20px;
    }
  </style>
</head>
<body>

  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <div class="container">
    <header>
      <h1>Civil Complaint Harness Dashboard</h1>
      <p>공무원 및 경찰관서 민원 처리를 위한 AI 에이전트 협업 & 적법절차 검증 시스템</p>
    </header>

    <div class="dashboard-grid">
      <!-- 사이드바 제어기 -->
      <aside class="sidebar">
        <h2>협업 파이프라인 단계</h2>
        <ul class="tab-list">
          <li class="tab-item active" onclick="switchTab(0)">
            <span class="tab-number">00</span>
            <span class="tab-label">민원 신청 원본</span>
          </li>
          <li class="tab-item" onclick="switchTab(1)">
            <span class="tab-number">01</span>
            <span class="tab-label">카테고리 분류</span>
          </li>
          <li class="tab-item" onclick="switchTab(2)">
            <span class="tab-number">02</span>
            <span class="tab-label">관련 법령 및 규정 검색</span>
          </li>
          <li class="tab-item" onclick="switchTab(3)">
            <span class="tab-number">03</span>
            <span class="tab-label">답변서 1차 초안</span>
          </li>
          <li class="tab-item" onclick="switchTab(4)">
            <span class="tab-number">04</span>
            <span class="tab-label">보안 및 법률 검수</span>
          </li>
          <li class="tab-item" onclick="switchTab(5)">
            <span class="tab-number">05</span>
            <span class="tab-label">최종 승인 답변 공문</span>
          </li>
        </ul>
      </aside>

      <!-- 메인 결과 패널 -->
      <main class="content-panel" id="content-panel">
        <!-- 에이전트 소개 영역 -->
        <div class="agent-card" id="agent-info-card">
          <div class="agent-avatar" id="agent-avatar" style="background: var(--accent-purple);">📥</div>
          <div class="agent-meta">
            <h3 id="agent-name">민원 접수함</h3>
            <p id="agent-role">외부 민원 수집 단계</p>
          </div>
        </div>

        <!-- 텍스트/마크다운 출력 영역 -->
        <div class="doc-renderer fade-element" id="doc-content">
          <!-- 스크립트에서 동적으로 렌더링 -->
        </div>
      </main>
    </div>

    <footer>
      8회차 과제 제출물 — AI 에이전트 설계 및 바이브 코딩 하네스 규격 구현
    </footer>
  </div>

  <script>
    // 내장형 정적 데이터상수 (웹 서버 CORS 제약 없이 더블클릭 구동 보증)
    const EMBEDDED_DATA = {
      0: {
        agent: "민원 접수함",
        role: "시민이 인터넷 또는 관서로 직접 제출한 민원 원본 데이터",
        avatar: "📥",

## 민원 내용

안녕하십니까. 저는 지난 7월 10일 오후 3시경 경주 황리단길 교차로 부근에서 발생한 접촉사고의 피해 차량(차량번호: 12가 3456) 운전자 김철수입니다.

      },

        color: "var(--accent-cyan)",

        content: `# 법률 및 규정 검색 리포트

## 검색 매핑 법령

### [1] 공공기관의 정보공개에 관한 법률 제9조에 따른 경찰 수사/CCTV 자료 심사 지침 (일반행정/기타)

2. 일반 CCTV 자료 등 제3자의 화상이나 차량번호 등이 포함된 경우, 정보주체(타인)의 명백한 동의가 없거나 모자이크 등 비식별 조치(마스킹)를 취하지 않은 상태에서의 공개는 불가하며, 비식별화 비용은 청구인이 부담할 수 있습니다.

## 추가 행정 해석 및 판례 지식
- **정보공개법 제9조 제1항 제6호**: 개인의 초상, 성명, 차량번호 등 개인정보는 비공개 대상 정보에 해당함.

      },

      },

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // 마크다운 줄바꿈 및 강조, 이식 렌더러
    function renderMarkdown(text) {
      // 1. 코드 블록 임시 치환하여 인라인 코드 및 개행 정규식의 간섭 차단
      const codeBlocks = [];
      let html = text.replace(/```(json|markdown)?([\s\S]*?)```/g, function(match, lang, code) {
        // white-space: pre-wrap 및 word-break: break-all을 추가해 코드의 가로 잘림 현상 차단
        codeBlocks.push(`<pre style="background: #08070d; padding: 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); overflow-x: auto; white-space: pre-wrap; word-break: break-all; color: #a78bfa; font-family: monospace; font-size: 0.9rem; line-height: 1.4; margin-bottom: 16px;"><code class="language-${lang || ''}">${escapeHtml(code.trim())}</code></pre>`);
        return `__CODE_BLOCK_${codeBlocks.length - 1}__`;
      });

      // 2. 다른 마크다운 요소 파싱
      html = html
        // 수평선 (---) 먼저 파싱하여 리스트 기호 간섭 배제
        .replace(/^\s*---\s*$/gim, '<hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); margin: 24px 0;">')
        // 헤더 렌더링
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        // 강조
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        // 인라인 코드
        .replace(/`(.*?)`/g, '<code>$1</code>')
        // 불릿 기호 (--- 형태의 수평선 간섭 방지를 위해 부정형 전방탐색 적용)
        .replace(/^\s*-\s*\*\*(.*?)\*\*:\s*(.*)/gim, '<li><strong>$1</strong>: $2</li>')
        .replace(/^\s*-\s+(?!-)(.*)/gim, '<li>$1</li>')
        // 문단 개행
        .replace(/\n/g, '<br>');

      // 3. 코드 블록 복원
      html = html.replace(/__CODE_BLOCK_(\d+)__/g, function(match, index) {
        return codeBlocks[parseInt(index)];
      });

      return html;
    }

    // 탭 스위치
    function switchTab(index) {
      // 탭 활성화 처리
      const items = document.querySelectorAll('.tab-item');
      items.forEach((item, idx) => {
        if (idx === index) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });

      // 데이터 패치 및 정보카드 변경
      const data = EMBEDDED_DATA[index];
      
      const avatarEl = document.getElementById('agent-avatar');
      const nameEl = document.getElementById('agent-name');
      const roleEl = document.getElementById('agent-role');
      const contentEl = document.getElementById('doc-content');
      
      // 아바타 애니메이션
      avatarEl.style.transform = 'scale(0.8)';
      avatarEl.style.opacity = '0.5';
      
      setTimeout(() => {
        avatarEl.innerHTML = data.avatar;
        avatarEl.style.background = data.color;
        nameEl.innerText = data.agent;
        roleEl.innerText = data.role;
        
        avatarEl.style.transform = 'scale(1)';
        avatarEl.style.opacity = '1';
      }, 150);

      // 내용물 변경 및 페이드 효과
      contentEl.style.opacity = '0';
      setTimeout(() => {
        contentEl.innerHTML = renderMarkdown(data.content);
        contentEl.style.opacity = '1';
      }, 150);
    }

    // 윈도우 로드 시 첫 탭 로드
    window.onload = function() {
      switchTab(0);
      
      // 웹서버 동작 시 실제 _workspace 폴더 내 파일 비동기 수집 시도 (CORS 발생하지 않는 정식 웹서버 환경 지원용)
      const fileNames = [
        "00_input.md",
        "01_classification.md",
        "02_laws_search.md",
        "03_draft_reply.md",
        "04_review_report.md",
        "05_final_notice.md"
      ];
      
      fileNames.forEach((name, idx) => {
        fetch(`_workspace/${name}`)
          .then(res => {
            if (res.ok) return res.text();
            throw new Error();
          })
          .then(text => {
            // 외부 파일 로드 성공 시 정적 캐시 데이터 갱신
            EMBEDDED_DATA[idx].content = text;
            if (document.querySelector('.tab-item.active').innerText.includes(name.substring(0, 2))) {
              switchTab(idx); // 활성 탭 갱신
            }
          })
          .catch(() => {
            // 로컬 file:// 구동으로 인한 CORS 에러 등은 정적 내장 데이터가 이미 있으므로 조용히 무시함.
          });
      });
    };
  </script>
